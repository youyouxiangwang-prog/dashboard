<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    h1, h2, h3 { font-family: 'Cinzel', serif; }
    
    .section {
      background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 40, 0.95));
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 215, 0, 0.1);
    }
    
    .section-title {
      font-family: 'MedievalSharp', cursive;
      font-size: 1rem;
      color: #d4af37;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }
    
    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #d4af37;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-card.completed .stat-number { color: #10b981; }
    .stat-card.remaining .stat-number { color: #f59e0b; }
    
    /* Knowledge Base */
    .kb-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    .kb-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .kb-name { font-size: 0.875rem; color: #e2e8f0; }
    .kb-count {
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    /* Task List */
    .task-list { margin-top: 1rem; }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .task-title { font-size: 0.875rem; }
    .task-meta {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.25rem;
    }
    .task-badge {
      font-size: 0.625rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }
    .badge-Work { background: #3b82f6; color: white; }
    .badge-Personal { background: #ec4899; color: white; }
    .badge-YouTube { background: #f59e0b; color: white; }
    .badge-SaaS { background: #10b981; color: white; }
    .badge-AI { background: #8b5cf6; color: white; }
    
    .empty { color: #64748b; font-size: 0.875rem; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align: center; color: #d4af37; margin-bottom: 1.5rem;">✨ Dashboard ✨</h1>
    
    <!-- Task Statistics -->
    <div class="section">
      <div class="section-title">📊 Task Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalTasks">-</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card completed">
          <div class="stat-number" id="completedTasks">-</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card remaining">
          <div class="stat-number" id="remainingTasks">-</div>
          <div class="stat-label">Remaining</div>
        </div>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
    
    <!-- Knowledge Base -->
    <div class="section">
      <div class="section-title">📚 Knowledge Base</div>
      <div class="kb-grid" id="kbGrid">
        <div class="kb-item"><span class="kb-name">📝 Memory Files</span><span class="kb-count">11</span></div>
        <div class="kb-item"><span class="kb-name">📄 Documents</span><span class="kb-count">14</span></div>
        <div class="kb-item"><span class="kb-name">💾 Uploaded Files</span><span class="kb-count">0</span></div>
        <div class="kb-item"><span class="kb-name">📅 Events</span><span class="kb-count">0</span></div>
      </div>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const remaining = total - completed;
      
      document.getElementById('totalTasks').textContent = total;
      document.getElementById('completedTasks').textContent = completed;
      document.getElementById('remainingTasks').textContent = remaining;
      
      const taskList = document.getElementById('taskList');
      if (tasks.length === 0) {
        taskList.innerHTML = '<div class="empty">No tasks</div>';
      } else {
        taskList.innerHTML = tasks.map(t => `
          <div class="task-item">
            <div>
              <div class="task-title">${t.completed ? '✓ ' : '○ '}${t.title}</div>
              <div class="task-meta">Due: ${t.dueDate || 'No date'} • Priority: ${t.priority}</div>
            </div>
            <span class="task-badge badge-${t.category}">${t.category}</span>
          </div>
        `).join('');
      }
    }
    
    loadDashboard();
  </script>
</body>
</html>
