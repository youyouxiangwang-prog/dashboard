<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PKMS - 个人知识管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
    
    /* Animations */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in {
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    
    /* Todo item transitions */
    .todo-item {
      transition: all 0.2s ease;
    }
    .todo-item:hover {
      transform: translateX(4px);
    }
    
    /* Priority indicators */
    .priority-urgent { border-left: 4px solid #ef4444; }
    .priority-high { border-left: 4px solid #f97316; }
    .priority-medium { border-left: 4px solid #eab308; }
    .priority-low { border-left: 4px solid #22c55e; }
    
    /* Status badges */
    .status-pending { background: #3b82f6; }
    .status-in_progress { background: #8b5cf6; }
    .status-completed { background: #22c55e; }
    .status-overdue { background: #ef4444; }
    
    /* Markdown content styling */
    .markdown-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    .markdown-content h2 { font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown-content h3 { font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .markdown-content p { margin: 0.5rem 0; line-height: 1.6; }
    .markdown-content ul, .markdown-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .markdown-content li { margin: 0.25rem 0; }
    .markdown-content code { background: #334155; padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.9em; }
    .markdown-content pre { background: #1e293b; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
    .markdown-content pre code { background: none; padding: 0; }
    .markdown-content blockquote { border-left: 3px solid #475569; padding-left: 1rem; margin: 0.5rem 0; color: #94a3b8; }
    .markdown-content a { color: #60a5fa; text-decoration: underline; }
    .markdown-content hr { border: none; border-top: 1px solid #334155; margin: 1rem 0; }
    
    /* Block reference styling */
    .block-ref {
      background: #334155;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-size: 0.85em;
      cursor: pointer;
    }
    .block-ref:hover {
      background: #475569;
    }
    
    /* Note link styling */
    .note-link {
      color: #60a5fa;
      cursor: pointer;
      text-decoration: none;
    }
    .note-link:hover {
      text-decoration: underline;
    }
    
    /* Tab styling */
    .tab-btn {
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: #3b82f6;
      color: white;
    }
    
    /* Modal backdrop */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
    }
    
    /* Loading spinner */
    .spinner {
      border: 2px solid #334155;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Empty state */
    .empty-state {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div id="app">
    <!-- Header -->
    <header class="bg-slate-800/80 backdrop-blur-sm border-b border-slate-700 sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
              🧠 PKMS
            </h1>
            <span class="text-slate-400 text-sm">个人知识管理系统</span>
          </div>
          <div class="flex items-center gap-4">
            <!-- Stats mini -->
            <div id="header-stats" class="hidden sm:flex items-center gap-4 text-sm">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                <span id="stat-pending" class="text-slate-300">0 待办</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-purple-500"></span>
                <span id="stat-notes" class="text-slate-300">0 笔记</span>
              </div>
            </div>
            <!-- Search -->
            <div class="relative">
              <input type="text" id="global-search" placeholder="搜索..." 
                class="bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 pl-10 w-48 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
              <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      <!-- Tab Navigation -->
      <div class="flex gap-2 mb-6">
        <button class="tab-btn active px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium" data-tab="todos">
          <i class="fas fa-check-circle mr-2"></i>任务
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium" data-tab="notes">
          <i class="fas fa-book mr-2"></i>笔记
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium" data-tab="daily">
          <i class="fas fa-calendar-day mr-2"></i>每日
        </button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium" data-tab="search">
          <i class="fas fa-search mr-2"></i>搜索
        </button>
      </div>

      <!-- Todos Tab -->
      <section id="tab-todos" class="tab-content animate-fade-in">
        <div class="flex flex-col lg:flex-row gap-6">
          <!-- Todo Form -->
          <div class="lg:w-1/3">
            <div class="bg-slate-800 rounded-xl p-6 sticky top-24">
              <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-blue-400"></i>
                新建任务
              </h2>
              <form id="todo-form" class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-slate-300 mb-1">标题 *</label>
                  <input type="text" id="todo-title" required
                    class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="输入任务标题...">
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-300 mb-1">描述</label>
                  <textarea id="todo-description" rows="3"
                    class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                    placeholder="详细描述（支持 Markdown）..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">截止日期</label>
                    <input type="datetime-local" id="todo-deadline"
                      class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">提醒时间</label>
                    <input type="datetime-local" id="todo-reminder"
                      class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">优先级</label>
                    <select id="todo-priority"
                      class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                      <option value="low">🟢 低</option>
                      <option value="medium" selected>🟡 中</option>
                      <option value="high">🟠 高</option>
                      <option value="urgent">🔴 紧急</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">标签</label>
                    <input type="text" id="todo-tags"
                      class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="标签用逗号分隔">
                  </div>
                </div>
                <button type="submit"
                  class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-medium py-2.5 rounded-lg hover:from-blue-600 hover:to-purple-700 transition-all shadow-lg shadow-blue-500/25">
                  <i class="fas fa-plus mr-2"></i>创建任务
                </button>
              </form>
            </div>
          </div>

          <!-- Todo List -->
          <div class="lg:w-2/3">
            <!-- Filter Bar -->
            <div class="flex flex-wrap gap-2 mb-4">
              <button class="filter-btn active px-3 py-1.5 rounded-full text-sm bg-blue-500 text-white" data-filter="all">全部</button>
              <button class="filter-btn px-3 py-1.5 rounded-full text-sm bg-slate-700 text-slate-300 hover:bg-slate-600" data-filter="pending">待处理</button>
              <button class="filter-btn px-3 py-1.5 rounded-full text-sm bg-slate-700 text-slate-300 hover:bg-slate-600" data-filter="in_progress">进行中</button>
              <button class="filter-btn px-3 py-1.5 rounded-full text-sm bg-slate-700 text-slate-300 hover:bg-slate-600" data-filter="completed">已完成</button>
              <button class="filter-btn px-3 py-1.5 rounded-full text-sm bg-slate-700 text-slate-300 hover:bg-slate-600" data-filter="overdue">已过期</button>
            </div>

            <!-- Todo Items Container -->
            <div id="todos-container" class="space-y-3">
              <!-- Loading state -->
              <div class="flex justify-center py-12">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Notes Tab -->
      <section id="tab-notes" class="tab-content hidden animate-fade-in">
        <div class="flex flex-col lg:flex-row gap-6">
          <!-- Notes Sidebar -->
          <div class="lg:w-1/4">
            <div class="bg-slate-800 rounded-xl p-4 sticky top-24">
              <div class="flex items-center justify-between mb-4">
                <h2 class="font-semibold flex items-center gap-2">
                  <i class="fas fa-folder text-yellow-400"></i>笔记
                </h2>
                <button id="new-note-btn" class="w-8 h-8 rounded-lg bg-blue-500 hover:bg-blue-600 flex items-center justify-center transition-colors">
                  <i class="fas fa-plus text-sm"></i>
                </button>
              </div>
              <!-- Note Type Filter -->
              <div class="flex flex-wrap gap-2 mb-4">
                <button class="note-type-btn active px-2 py-1 rounded text-xs bg-slate-700" data-type="all">全部</button>
                <button class="note-type-btn px-2 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-type="project">项目</button>
                <button class="note-type-btn px-2 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-type="reference">参考</button>
              </div>
              <!-- Notes List -->
              <div id="notes-sidebar" class="space-y-2 max-h-[60vh] overflow-y-auto">
                <!-- Populated by JS -->
              </div>
            </div>
          </div>

          <!-- Note Editor/Viewer -->
          <div class="lg:w-3/4">
            <div id="note-editor" class="bg-slate-800 rounded-xl p-6 min-h-[500px]">
              <div class="flex items-center justify-between mb-6">
                <input type="text" id="note-title" 
                  class="text-2xl font-bold bg-transparent border-none outline-none w-full text-slate-100 placeholder-slate-500"
                  placeholder="笔记标题...">
                <div class="flex items-center gap-2">
                  <select id="note-type" class="bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="general">通用</option>
                    <option value="project">项目</option>
                    <option value="reference">参考</option>
                  </select>
                  <button id="save-note-btn" class="px-4 py-1.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-sm font-medium transition-colors">
                    保存
                  </button>
                </div>
              </div>
              <!-- Tags -->
              <div class="flex flex-wrap items-center gap-2 mb-4">
                <i class="fas fa-tags text-slate-400 text-sm"></i>
                <div id="note-tags-display" class="flex flex-wrap gap-1">
                  <!-- Tags populated by JS -->
                </div>
                <input type="text" id="note-tags-input" 
                  class="bg-transparent border-none outline-none text-sm text-slate-300 w-32"
                  placeholder="+ 添加标签">
              </div>
              <!-- Content -->
              <textarea id="note-content"
                class="w-full h-[400px] bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none font-mono text-sm leading-relaxed"
                placeholder="使用 Markdown 编写笔记...

支持的功能:
- #标题  标签
- [[笔记链接]]  块引用
- **粗体** *斜体*  代码
- - 列表  1. 有序列表"></textarea>
              
              <!-- Linked Notes -->
              <div id="linked-notes-section" class="mt-4 hidden">
                <h3 class="text-sm font-medium text-slate-400 mb-2">
                  <i class="fas fa-link mr-1"></i>关联笔记
                </h3>
                <div id="linked-notes-list" class="flex flex-wrap gap-2">
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Daily Notes Tab -->
      <section id="tab-daily" class="tab-content hidden animate-fade-in">
        <div class="bg-slate-800 rounded-xl p-6 max-w-4xl mx-auto">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
              <button id="prev-day" class="w-10 h-10 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-colors">
                <i class="fas fa-chevron-left"></i>
              </button>
              <h2 id="daily-date" class="text-2xl font-bold">加载中...</h2>
              <button id="next-day" class="w-10 h-10 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition-colors">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
            <button id="today-btn" class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-sm font-medium transition-colors">
              回到今天
            </button>
          </div>
          
          <div class="grid grid-cols-7 gap-2 mb-4">
            <div class="text-center text-sm text-slate-400 py-2">日</div>
            <div class="text-center text-sm text-slate-400 py-2">一</div>
            <div class="text-center text-sm text-slate-400 py-2">二</div>
            <div class="text-center text-sm text-slate-400 py-2">三</div>
            <div class="text-center text-sm text-slate-400 py-2">四</div>
            <div class="text-center text-sm text-slate-400 py-2">五</div>
            <div class="text-center text-sm text-slate-400 py-2">六</div>
          </div>
          <div id="mini-calendar" class="grid grid-cols-7 gap-2 mb-6">
            <!-- Generated by JS -->
          </div>

          <div id="daily-content-wrapper" class="bg-slate-700/30 rounded-xl p-4">
            <textarea id="daily-content"
              class="w-full h-[400px] bg-transparent border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none font-mono text-sm leading-relaxed"
              placeholder="今天的笔记... (自动保存)"></textarea>
          </div>
        </div>
      </section>

      <!-- Search Tab -->
      <section id="tab-search" class="tab-content hidden animate-fade-in">
        <div class="max-w-3xl mx-auto">
          <div class="bg-slate-800 rounded-xl p-6">
            <div class="relative mb-6">
              <input type="text" id="search-input"
                class="w-full bg-slate-700 border border-slate-600 rounded-xl px-6 py-4 pl-14 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="搜索笔记和任务...">
              <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
            </div>
            <div id="search-results" class="space-y-4">
              <div class="text-center text-slate-400 py-8">
                <i class="fas fa-search text-4xl mb-4 opacity-50"></i>
                <p>输入关键词搜索笔记和任务</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Todo Detail Modal -->
    <div id="todo-modal" class="fixed inset-0 z-50 hidden">
      <div class="modal-backdrop absolute inset-0" onclick="closeTodoModal()"></div>
      <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-2xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden animate-slide-in">
        <div class="p-6">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h3 id="modal-todo-title" class="text-xl font-bold"></h3>
              <span id="modal-todo-priority" class="inline-block px-2 py-0.5 rounded text-xs font-medium mt-1"></span>
            </div>
            <button onclick="closeTodoModal()" class="w-8 h-8 rounded-lg hover:bg-slate-700 flex items-center justify-center transition-colors">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div id="modal-todo-description" class="markdown-content text-slate-300 mb-4"></div>
          <div class="flex flex-wrap gap-4 text-sm text-slate-400 mb-6">
            <div><i class="far fa-calendar mr-1"></i>截止: <span id="modal-todo-deadline"></span></div>
            <div><i class="far fa-clock mr-1"></i>提醒: <span id="modal-todo-reminder"></span></div>
            <div><i class="far fa-flag mr-1"></i>状态: <span id="modal-todo-status"></span></div>
          </div>
          <div id="modal-todo-tags" class="flex flex-wrap gap-2 mb-6"></div>
          <div class="flex justify-between">
            <div class="flex gap-2">
              <button id="modal-edit-btn" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium transition-colors">
                <i class="fas fa-edit mr-1"></i>编辑
              </button>
              <button id="modal-delete-btn" class="px-4 py-2 rounded-lg bg-red-500/20 hover:bg-red-500/30 text-red-400 text-sm font-medium transition-colors">
                <i class="fas fa-trash mr-1"></i>删除
              </button>
            </div>
            <button id="modal-complete-btn" class="px-6 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-sm font-medium transition-colors">
              <i class="fas fa-check mr-1"></i>完成
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
      <div class="bg-slate-700 rounded-xl px-6 py-4 shadow-xl flex items-center gap-3">
        <i id="toast-icon" class="fas fa-check-circle text-green-400"></i>
        <span id="toast-message"></span>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
